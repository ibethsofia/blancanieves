<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galería</title>
    <link rel="stylesheet" href="css/estilos.css" />
  </head>

  <body>
    <!-- HEADER -->
    <header class="cabezote">
      <div class="contenedor navegacion">
        <div class="logotipo">
          <img src="images/logo pagina web.png" alt="Logo Blancanieves" />
        </div>
        <nav class="menu">
          <ul>
            <li><a href="index.html">INICIO</a></li>
            <li><a href="#">MENÚ</a></li>
            <li><a href="#">NOSOTROS</a></li>
            <li><a href="#">GALERIA</a></li>
            <li><a href="#">CONTACTO</a></li>
            <li><a href="pan.html" class="active">PAN MASA MADRE</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- PORTADA -->
    <section class="portada">
      <div class="contenedor contenido-portada">
        <h2 class="titulo-marca">Galería</h2>
        <p class="frase-intro">
          Un recorrido visual por los sabores, espacios y </br> detalles que hacen
          parte de nuestra experiencia diaria
        </p>
        <a href="#" class="boton-rojo">Ver menú</a>
      </div>
    </section>

    <!-- SLIDER -->
    <section class="slider-blancanieves">
      <div class="galeria-grid">
        <!-- Fila 1 -->
        <div class="galeria-item gi-r1c1">
          <img src="images/artur-opala-tgQVfDsvfpM-unsplash.jpg" alt="Pan artesanal" />
        </div>
        <div class="galeria-item gi-r1c2">
          <img src="images/sergio-rota-to7SFE2Q58Y-unsplash.jpg" alt="Masa madre" />
        </div>
        <div class="galeria-item gi-r1c3">
          <img src="images/yasin-onus-pIhQf7ukVyo-unsplash.jpg" alt="Panadería" />
        </div>
        <!-- Fila 2 -->
        <div class="galeria-item gi-r2c1">
          <img src="images/shawn-nmpW_WwwVSc-unsplash.jpg" alt="Cafetería" />
        </div>
        <div class="galeria-item gi-r2c2">
          <img src="images/jonathan-borba-5G9uIkAXLSc-unsplash.jpg" alt="Café" />
        </div>
        <div class="galeria-item gi-r2c3">
          <img src="images/terski-sourdough-9865309_1920 (1).jpg" alt="Pan de masa madre" />
        </div>
      </div>
    </section>

    <!-- SECCIÓN ROJA -->
    <section class="galeria-roja">
      <div class="galeria-roja-grid">
        <div class="gr-item">
          <img src="images/shawn-nmpW_WwwVSc-unsplash.jpg" alt="Interior cafetería" />
        </div>
        <div class="gr-item">
          <img src="images/thinh_nguyen204-coffee-shop-7356119_1920.jpg" alt="Barra de café" />
        </div>
        <div class="gr-item">
          <img src="images/terski-sourdough-9865309_1920 (1).jpg" alt="Pan masa madre" />
        </div>
      </div>
    </section>

  </body>
</html>
